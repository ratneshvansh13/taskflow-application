apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: taskflow-app
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
          - name: MYSQL_ROOT_PASSWORD
            value: root123
          - name: MYSQL_DATABASE
            value: taskmanager
        ports:
          - containerPort: 3306
        type: ClusterIP
        volumeMounts:
          - name: mysql-data
            mountPath: /var/lib/mysql
volumes:
  - name: mysql-data
    emptyDir: {}
---

apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: taskflow-app
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
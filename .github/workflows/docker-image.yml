name: TASKFLOW CI

on:
  push:
    branches: 
      - main
      - test
      
  pull_request:
    branches: 
      - main
      
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: setup node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm 
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json
    
#####################
# Backend

    - name: Install Backend Dependencies
      working-directory: backend
      run: npm ci

#####################
# Frontend

    - name: Install Frontend Dependencies
      working-directory: frontend
      run: npm install

    - name: Build React App
      working-directory: frontend
      env:
        CI: false
      run: npm run build 

#####################
# Docker Build

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      run: docker build -t taskflow-backend:latest ./backend
    - name: Build Frontend Docker Image
      run: docker build -t taskflow-frontend:latest ./frontend

##########################
# PUSH TO DOCKER 
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest


######################
# FORNTEND PUSH TO DOCKER 
    - name: Build and Push Frontend
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:latest

        
#####################
# Docker Compose Validation

    - name: Validate Docker Compose
      run: docker compose config
